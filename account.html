<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alike+Angular&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles_acc.css">

    <title>Document</title>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <img src="./front images/Tropical_paradise_logo_design-removebg-preview.png">
            <span>PHILIPPINE TOURISM</span>
        </div>

        <nav>
            <a href="./home.html">HOME</a>
            <a href="./about_us.html">ABOUT US</a>
            <a href="./contact_us.html">CONTACT US</a>
            <a href="./account.html">ACCOUNT</a>
        </nav>
    </header>

    <!-- HERO -->
    <div class="hero">
        <img src="./front images/cebu-oslob-706769056.avif" alt="">

        <!-- RIGHT CONTENT -->
        <div class="right-content">

            <div class="welcome-text">
                <h2>Welcome Back!</h2>
                <p>
                    Log in to continue your journey and<br>
                    explore the beauty of the Philippines.
                </p>
            </div>

            <div class="sign-in">
                <form>
                    <h4 class="h3 mb-3 fw-normal">🔐 Account Log-in</h4>

                    <div class="form-floating">
                        <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                        <label for="floatingInput">Email address</label>
                    </div>

                    <div class="form-floating">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                        <label for="floatingPassword">Password</label>
                    </div>

                    <div class="form-check text-start my-3">
                        <input class="form-check-input" type="checkbox" id="checkDefault">
                        <label class="form-check-label" for="checkDefault">Remember me</label>
                    </div>

                    <button class="btn btn-primary w-100 py-2" type="submit">Sign in</button>
                </form>
            </div>

        </div> <!-- ✅ FIX: closed right-content -->

    </div> <!-- ✅ FIX: closed hero -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
